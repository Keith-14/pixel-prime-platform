workflows:
  ios-workflow:
    name: Barakah iOS

    environment:
      xcode: latest
      node: 22

      ios_signing:
        certificates:
          - Barakah
        provisioning_profiles:
          - barakah_appstore_profile

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Inspect iOS project
        script: |
          pwd
          find ios -maxdepth 3 | sort

      - name: Build IPA
        script: |
          cd ios/App

          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=<YOUR_TEAM_ID>

          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
