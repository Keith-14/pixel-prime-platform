workflows:
  ios-workflow:
    name: Barakah iOS

    environment:
      xcode: latest
      node: 22

      ios_signing:
        certificates:
          - Barakah
        provisioning_profiles:
          - barakah_appstore_profile

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Check iOS folder
        script: |
          pwd
          ls -la
          ls -la ios
          ls -la ios/App

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
