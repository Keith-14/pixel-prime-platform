workflows:
  ios-workflow:
    name: Barakah iOS

    environment:
      xcode: latest
      node: 22

      ios_signing:
        certificates:
          - Barakah
        provisioning_profiles:
          - barakah_appstore_profile

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Inspect iOS project
        script: |
          pwd
          find ios -maxdepth 3 | sort

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
